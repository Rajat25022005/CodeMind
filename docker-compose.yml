# CodeMind Backend

services:
  # Neo4j - Temporal Knowledge Graph
  neo4j:
    image: neo4j:5-community
    container_name: codemind-neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/codemind_dev
    volumes:
      - neo4j_data:/data

  # Qdrant - Vector Store
  qdrant:
    image: qdrant/qdrant:latest
    container_name: codemind-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codemind-backend
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: codemind_dev
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      PYTHONPATH: /app
    depends_on:
      - neo4j
      - qdrant
    volumes:
      - ./backend:/app

volumes:
  neo4j_data:
  qdrant_data:
