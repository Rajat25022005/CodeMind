# CodeMind — Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml up -d --build

services:
  # Neo4j — Temporal Knowledge Graph
  neo4j:
    image: neo4j:5-community
    container_name: codemind-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Browser UI (consider removing in production)
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme}
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Qdrant — Vector Store
  qdrant:
    image: qdrant/qdrant:latest
    container_name: codemind-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codemind-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      PYTHONPATH: /app
      LOG_LEVEL: WARNING
      ALLOWED_ORIGINS: http://localhost,http://localhost:80
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Frontend — Nginx serving React SPA + reverse proxy
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: codemind-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  neo4j_data:
  qdrant_data:
